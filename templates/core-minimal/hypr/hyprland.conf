# --- Hyprland Core Minimal Template ---
# Dieses Template enthält nur funktionale Einstellungen (Monitore, Inputs, Hotkeys).
# Kein Design, kein Blur, kein Rounding. 
# Ideal als Basis für neue Themes.

# --- Monitore ---
# (Wird automatisch vom System erkannt, falls hier leer)
monitor=,highres,auto,1

# --- Variablen ---
$mod = SUPER
$terminal = kitty
$browser = firefox

# --- Input Einstellungen ---
input {
    kb_layout = de
    follow_mouse = 1
    sensitivity = 0 
    touchpad {
        natural_scroll = no
    }
}

# --- Core Autostart ---
exec-once = ~/.config/hypr/scripts/xdg-portal-hyprland
exec-once = waybar
exec-once = swww-daemon
exec-once = hypridle

# --- Windows-Style Sonderzeichen (AltGr Mapping via wtype) ---
bind = CTRL ALT, Q, exec, wtype "@"
bind = CTRL ALT, E, exec, wtype "€"
bind = CTRL ALT, 2, exec, wtype "²"
bind = CTRL ALT, 3, exec, wtype "³"
bind = CTRL ALT, M, exec, wtype "µ"
bind = CTRL ALT, 7, exec, wtype "{"
bind = CTRL ALT, 8, exec, wtype "["
bind = CTRL ALT, 9, exec, wtype "]"
bind = CTRL ALT, 0, exec, wtype "}"
bind = CTRL ALT, backslash, exec, wtype "\\"

# --- Standard Hotkeys ---
bind = $mod, Q, exec, $terminal
bind = $mod, C, killactive, 
bind = $mod, M, exit, 
bind = $mod, E, exec, dolphin
bind = $mod, V, togglefloating, 
bind = $mod, R, exec, rofi -show drun
bind = $mod, P, pseudo, # dwindle
bind = $mod, J, togglesplit, # dwindle
bind = $mod, L, exec, hyprlock

# --- Window Management (Mouse) ---
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# --- Design Placeholder (Hier können Themes eingefügt werden) ---
general {
    gaps_in = 0
    gaps_out = 0
    border_size = 1
    col.active_border = rgba(33ccffee)
    col.inactive_border = rgba(595959aa)
}

decoration {
    rounding = 0
    blur {
        enabled = false
    }
    shadow {
        enabled = false
    }
}

animations {
    enabled = false
}
