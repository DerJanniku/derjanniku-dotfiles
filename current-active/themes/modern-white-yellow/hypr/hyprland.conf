source = ~/.config/hypr/core/hyprland-core.conf

decoration {
    rounding = 5
    active_opacity = 1.0
    inactive_opacity = 0.95
    
    shadow {
        enabled = true
        range = 20
        render_power = 4
        color = rgba(fbc02d55)
    }

    blur {
        enabled = true
        size = 4
        passes = 2
        new_optimizations = true
        brightness = 1.2
        contrast = 1.5
    }
}

animations {
    enabled = true
    bezier = mechanical, 0, 1, 0, 1
    animation = windows, 1, 4, mechanical, slide
    animation = windowsOut, 1, 3, mechanical, popin 90%
    animation = border, 1, 6, default
    animation = fade, 1, 4, default
    animation = workspaces, 1, 4, mechanical, slide
}

general {
    gaps_in = 2
    gaps_out = 5
    border_size = 8
    col.active_border = rgba(fbc02dff) rgba(000000ff) 90deg
    col.inactive_border = rgba(333333ff)
    layout = dwindle
}

