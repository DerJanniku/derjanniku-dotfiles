source = ~/.config/hypr/core/hyprland-core.conf

decoration {
    rounding=15
    active_opacity = 0.98
    inactive_opacity = 0.90
    
    shadow {
        enabled = true
        range = 30
        render_power = 4
        color = rgba(00000044)
    }

    blur {
        enabled=true
        size=10
        passes=4
        new_optimizations = true
        ignore_opacity = true
        xray = false
        brightness = 1.1
        contrast = 1.3
        vibrancy = 0.6
    }
}

animations {
    enabled=1
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    animation = windows, 1, 6, overshot, slide
    animation = windowsOut, 1, 6, overshot, popin 80%
    animation = border, 1, 8, default
    animation = fade, 1, 6, default
    animation = workspaces, 1, 6, overshot, slide
}

general {
    gaps_in=6
    gaps_out=12
    border_size=3
    col.active_border=rgba(ffffffff) rgba(d32f2fff) 45deg
    col.inactive_border=rgba(33333333)
    layout=dwindle
    allow_tearing = true
}

env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct
env = WLR_DRM_NO_ATOMIC,1

misc {
    vrr = 1
    vfr = true
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

xwayland {
    force_zero_scaling = true
}

