source = ~/.config/hypr/core/hyprland-core.conf

decoration {
    rounding = 25
    active_opacity = 0.8
    inactive_opacity = 0.7
    
    shadow {
        enabled = true
        range = 40
        render_power = 4
        color = rgba(2e7d3233)
    }

    blur {
        enabled = true
        size = 12
        passes = 4
        new_optimizations = true
        ignore_opacity = true
        vibrancy = 0.8
        brightness = 1.0
        contrast = 1.1
    }
}

animations {
    enabled = true
    bezier = smooth, 0.4, 0, 0.2, 1
    animation = windows, 1, 10, smooth, slide
    animation = windowsOut, 1, 8, smooth, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 10, default
    animation = workspaces, 1, 8, smooth, fade
}

general {
    gaps_in = 10
    gaps_out = 20
    border_size = 4
    col.active_border = rgba(2e7d32ff) rgba(1b5e20ff) 45deg
    col.inactive_border = rgba(000000aa)
    layout = dwindle
}

