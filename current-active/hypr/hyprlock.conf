# --- Hyprlock Industrial White & Red ---

background {
    monitor =
    path = $HOME/.config/backgrounds/00_industrial_white_red.jpg
    color = rgba(255, 255, 255, 1.0)
    blur_passes = 1
    blur_size = 7
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 4
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgb(211, 47, 47)
    inner_color = rgb(255, 255, 255)
    font_color = rgb(0, 0, 0)
    fade_on_empty = true
    placeholder_text = <span foreground="##000000">Identify Yourself...</span>
    hide_input = false
    position = 0, -100
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgb(211, 47, 47)
    font_size = 120
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "<b>Arch Nexus System Active</b>"
    color = rgb(0, 0, 0)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 10
    halign = center
    valign = bottom
}
